<!DOCTYPE html>
<html>

<head>
    <title>Client-Side XSS Lab</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }
    </style>
</head>

<body>
    <h1>Welcome to the Dashboard</h1>

    <div id="welcome-message" style="padding: 10px; background: #e0f7fa; border-left: 5px solid #00bcd4;">
        Loading welcome message...
    </div>

    <hr>

    <h2>Search the Database</h2>
    <form action="http://localhost:8080/search" method="GET">
        <input type="text" name="q" placeholder="Enter search term..." />
        <button type="submit">Search</button>
    </form>

    <script>
        // DOM-BASED XSS LIVES HERE
        // The script reads the URL after the '#' symbol
        let hash = window.location.hash.substring(1);
        console.log("URL hash value:", hash);

        if (hash) {
            // It decodes the URL (e.g., %20 becomes a space)
            let decodedMessage = decodeURIComponent(hash);

            // VULNERABILITY: Writing directly to innerHTML executes scripts!
            document.getElementById("welcome-message").innerHTML = "Hello, " + decodedMessage + "!";
        } else {
            document.getElementById("welcome-message").innerHTML = "Hello, Guest! Try adding #YourName to the URL.";
        }
    </script>
</body>

</html>
